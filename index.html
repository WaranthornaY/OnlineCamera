<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Auto-Face Camera</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #video-container { position: relative; width: 100%; max-width: 600px; }
        video, #output-canvas { width: 100%; border-radius: 12px; border: 4px solid #333; }
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        button { padding: 15px 25px; cursor: pointer; border: none; border-radius: 50px; font-weight: bold; }
        .mode-btn { background: #457b9d; color: white; }
        .snap-btn { background: #e63946; color: white; }
        #gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; justify-content: center; }
        .gallery-item { width: 100px; height: 100px; object-fit: cover; border: 2px solid #555; cursor: pointer; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <div class="controls">
        <button id="snap-btn" class="snap-btn">CAPTURE</button>
        <button id="mode-btn" class="mode-btn" onclick="toggleMode()">MODE: MANUAL</button>
    </div>

    <div id="gallery"></div>
    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('hidden-canvas');
        const modeBtn = document.getElementById('mode-btn');
        let autoFaceMode = false;
        let lastFace = null;

        // Initialize Face Detector
        const faceDetector = new FaceDetection({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`});
        faceDetector.setOptions({ model: 'short' });
        faceDetector.onResults(results => lastFace = results.detections[0] || null);

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            // Continuous loop to track face
            const camera = new MediaStreamTrackProcessor({track: stream.getVideoTracks()[0]});
            requestAnimationFrame(async function detect() {
                await faceDetector.send({image: video});
                requestAnimationFrame(detect);
            });
        }
        init();

        function toggleMode() {
            autoFaceMode = !autoFaceMode;
            modeBtn.innerText = autoFaceMode ? "MODE: AUTO-FACE" : "MODE: MANUAL";
        }

        document.getElementById('snap-btn').addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            if (autoFaceMode && lastFace) {
                const b = lastFace.boundingBox;
                const size = Math.max(b.width, b.height) * canvas.width;
                ctx.drawImage(video, b.xMin * canvas.width, b.yMin * canvas.height, size, size, 0, 0, 600, 600);
            } else {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }

            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.className = 'gallery-item';
            img.onclick = () => { const a = document.createElement('a'); a.href = img.src; a.download = 'capture.png'; a.click(); };
            document.getElementById('gallery').prepend(img);
        });
    </script>
</body>
</html>
