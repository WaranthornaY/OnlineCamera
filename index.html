<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Camera Gallery with Viewer</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 500px; display: block; margin: 10px auto; border: 2px solid #333; }
        #gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .gallery-item { width: 100px; height: 75px; object-fit: cover; border: 2px solid #ddd; cursor: pointer; transition: transform 0.2s; }
        .gallery-item:hover { transform: scale(1.05); }

        /* Modal Styles */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        #modal img { max-width: 90%; max-height: 80%; border: 3px solid white; }
        #modal:target { display: flex; }
    </style>
</head>
<body>

    <h2>Live Camera</h2>
    <video id="video" autoplay playsinline></video>
    <button id="snap">Take Picture</button>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <h3>Gallery (Click to view)</h3>
    <div id="gallery"></div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="Enlarged view">
    </div>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap'), gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal'), modalImg = document.getElementById('modal-img');

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }

        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.className = 'gallery-item';
            
            // On click, show the modal
            img.onclick = () => {
                modalImg.src = img.src;
                modal.style.display = 'flex';
            };
            gallery.appendChild(img);
        });

        initCamera();
    </script>
</body>
</html>
