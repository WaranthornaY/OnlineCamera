<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Camera: Smart Face Snap</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>

    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
        #video-container { position: relative; width: 100%; max-width: 800px; }
        #video, #overlay { width: 100%; border-radius: 12px; }
        #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
        .controls { margin-top: 20px; }
        .gallery-item { width: 120px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-container"><button onclick="login()">Sign in with Google</button></div>
    
    <div id="app" style="display:none;">
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
            <button id="snap">SNAP FACE ONLY</button>
        </div>
        <div id="gallery"></div>
    </div>

    <script>
        // --- Setup ---
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        let currentDetection = null;

        // Initialize AI
        async function initAI() {
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
        }

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;
                detectFaces();
            };
        }

        async function detectFaces() {
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            setInterval(async () => {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                
                if (detection) {
                    currentDetection = detection.box;
                    ctx.strokeStyle = '#00FF00';
                    ctx.lineWidth = 5;
                    ctx.strokeRect(currentDetection.x, currentDetection.y, currentDetection.width, currentDetection.height);
                }
            }, 100);
        }

        // --- Snap Logic ---
        document.getElementById('snap').addEventListener('click', () => {
            if (!currentDetection) return alert("No face detected!");

            const canvas = document.createElement('canvas');
            canvas.width = currentDetection.width;
            canvas.height = currentDetection.height;
            
            // Crop specifically to the detected face box
            canvas.getContext('2d').drawImage(video, 
                currentDetection.x, currentDetection.y, currentDetection.width, currentDetection.height, 
                0, 0, currentDetection.width, currentDetection.height
            );

            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.className = 'gallery-item';
            document.getElementById('gallery').prepend(img);
        });

        // Firebase stuff...
        const firebaseConfig = { /* YOUR CONFIG HERE */ };
        firebase.initializeApp(firebaseConfig);
        firebase.auth().onAuthStateChanged(user => { if(user) { document.getElementById('login-container').style.display='none'; document.getElementById('app').style.display='block'; initAI().then(initCamera); } });
        function login() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    </script>
</body>
</html>
