<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Camera App</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; }
        #video-container { width: 100%; max-width: 800px; position: relative; }
        video { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border: 4px solid #444; border-radius: 12px; background: #000; }
        .controls { margin: 20px 0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 24px; cursor: pointer; border: none; border-radius: 50px; font-weight: bold; }
        #snap { background: #e63946; color: white; }
        #face-toggle { background: #f1fa8c; color: #000; }
        #gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; margin-top: 20px; }
        .gallery-item { width: 120px; height: 90px; object-fit: cover; border: 2px solid #555; cursor: pointer; border-radius: 4px; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        #modal img { max-width: 90%; max-height: 70%; border: 4px solid white; }
        .modal-btn { margin-top: 20px; background: #457b9d; color: white; }
    </style>
</head>
<body>

    <div id="login-container">
        <h1>Welcome to Pro Camera</h1>
        <button onclick="loginWithGoogle()">Sign in with Google to Access</button>
    </div>

    <div id="app" style="display:none;">
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
        </div>
        <div class="controls">
            <button id="snap">CAPTURE</button>
            <button id="face-toggle" onclick="toggleFaceMode()">MODE: FULL</button>
            <label>Brightness: <input type="range" id="brightness" min="50" max="150" value="100"></label>
            <button onclick="auth.signOut()" style="background:#555; color:white;">Logout</button>
        </div>
        <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>
        <h3>Session Gallery (Temporary)</h3>
        <div id="gallery"></div>
    </div>

    <div id="modal">
        <img id="modal-img" src="" alt="View">
        <button class="modal-btn" onclick="downloadImage()">Download with Credit</button>
        <button class="modal-btn" style="background:#666" onclick="document.getElementById('modal').style.display='none'">Close</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAkaCtuRL8KTPxZMhXytlQydWswKJu_cjo",
            authDomain: "cameraapp-d9059.firebaseapp.com",
            projectId: "cameraapp-d9059",
            storageBucket: "cameraapp-d9059.firebasestorage.app",
            messagingSenderId: "262503093138",
            appId: "1:262503093138:web:bdd21d41c64724c085674b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const video = document.getElementById('video'), canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap'), gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal'), modalImg = document.getElementById('modal-img');
        const brightness = document.getElementById('brightness'), faceBtn = document.getElementById('face-toggle');
        
        let faceMode = false;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                initCamera();
            }
        });

        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function toggleFaceMode() {
            faceMode = !faceMode;
            faceBtn.innerText = faceMode ? "MODE: FACE ONLY" : "MODE: FULL";
        }

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 } } });
            video.srcObject = stream;
        }

        brightness.oninput = () => video.style.filter = `brightness(${brightness.value}%)`;

        snap.addEventListener('click', () => {
    const ctx = canvas.getContext('2d');
    ctx.filter = video.style.filter;
    
    if (faceMode) {
        // Keep the crop square but don't stretch it strangely
        const size = 600; 
        const x = (canvas.width - size) / 2;
        const y = (canvas.height - size) / 2;
        
        // This draws the square in the center of a blank canvas
        // It avoids the "stretched" look
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height); // Black background
        ctx.drawImage(video, x, y, size, size, (canvas.width-size)/2, (canvas.height-size)/2, size, size);
    } else {
        // Normal Full Capture
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    }
    
    const img = document.createElement('img');
    img.src = canvas.toDataURL('image/png');
    img.className = 'gallery-item';
    img.onclick = () => { modalImg.src = img.src; modal.style.display = 'flex'; };
    gallery.prepend(img);
});

        function downloadImage() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 1920; tempCanvas.height = 1080;
            const ctx = tempCanvas.getContext('2d');
            const imgObj = new Image();
            imgObj.src = modalImg.src;
            imgObj.onload = () => {
                ctx.drawImage(imgObj, 0, 0);
                ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign = "right";
                ctx.fillText("https://waranthornay.github.io/OnlineCamera/", 1910, 1050);
                const link = document.createElement('a');
                link.download = 'photo-privacy-protected.png';
                link.href = tempCanvas.toDataURL('image/png');
                link.click();
            };
        }
    </script>
</body>
</html>
