<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Live Camera</title>
    
    <!-- Firebase Auth SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
        #app { display: none; width: 100%; max-width: 800px; text-align: center; }
        video { width: 100%; border: 4px solid #444; border-radius: 12px; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        #snap { background: #e63946; color: white; }
        #download-btn { background: #457b9d; color: white; display: none; }
    </style>
</head>
<body>

    <div id="login-container">
        <h1>Private Camera Access</h1>
        <button onclick="loginWithGoogle()">Sign in with Google</button>
    </div>

    <div id="app">
        <h1>Live Feed</h1>
        <video id="video" autoplay playsinline></video>
        <br>
        <button id="snap">CAPTURE TEMPORARY PHOTO</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <br>
        <a id="download-btn">DOWNLOAD PHOTO</a>
        <br>
        <button onclick="firebase.auth().signOut()">Logout</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAkaCtuRL8KTPxZMhXytlQydWswKJu_cjo",
            authDomain: "cameraapp-d9059.firebaseapp.com",
            projectId: "cameraapp-d9059",
            storageBucket: "cameraapp-d9059.firebasestorage.app",
            messagingSenderId: "262503093138",
            appId: "1:262503093138:web:bdd21d41c64724c085674b"
        };
        firebase.initializeApp(firebaseConfig);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const downloadBtn = document.getElementById('download-btn');

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                initCamera();
            } else {
                location.reload();
            }
        });

        function loginWithGoogle() {
            firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }

        document.getElementById('snap').addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Prepare download link
            const data = canvas.toDataURL('image/png');
            downloadBtn.href = data;
            downloadBtn.download = 'temporary-photo.png';
            downloadBtn.style.display = 'inline-block';
            downloadBtn.innerText = "CLICK TO DOWNLOAD";
        });
    </script>
</body>
</html>
