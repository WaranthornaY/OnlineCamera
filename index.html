<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Camera App</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4f4f9;
        }

        /* Responsive Video Container */
        video { 
            width: 100%; 
            max-width: 800px; 
            aspect-ratio: 16 / 9; 
            object-fit: cover; 
            border: 4px solid #333; 
            border-radius: 8px;
            background: #000;
        }

        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }

        /* Responsive Gallery */
        #gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            width: 100%; 
            margin-top: 20px;
        }

        .gallery-item { 
            width: 150px; 
            height: 112px; 
            object-fit: cover; 
            border: 2px solid #ccc; 
            cursor: pointer; 
            transition: transform 0.2s;
        }

        .gallery-item:hover { transform: scale(1.05); }

        /* Modal Styles */
        #modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000;
        }
        #modal img { max-width: 90%; max-height: 80%; border: 3px solid white; }
    </style>
</head>
<body>

    <h2>Live Camera</h2>
    <video id="video" autoplay playsinline></video>
    <button id="snap">Take Picture</button>
    <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

    <h3>Gallery</h3>
    <div id="gallery"></div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="Enlarged view">
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');

        // Initialize high-quality camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied or not available.");
            }
        }

        // Take the picture
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.className = 'gallery-item';
            
            // Make image clickable
            img.onclick = () => {
                modalImg.src = img.src;
                modal.style.display = 'flex';
            };
            
            gallery.appendChild(img);
        });

        initCamera();
    </script>
</body>
</html>
