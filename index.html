<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Camera App</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; }
        
        #video-container { position: relative; width: 100%; max-width: 800px; }
        video { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border: 4px solid #444; border-radius: 12px; background: #000; }
        
        .controls { margin: 20px 0; display: flex; gap: 20px; align-items: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #e63946; color: white; border: none; border-radius: 50px; font-weight: bold; }
        
        #gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; margin-top: 20px; }
        .gallery-item { width: 120px; height: 90px; object-fit: cover; border: 2px solid #555; cursor: pointer; border-radius: 4px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        #modal img { max-width: 90%; max-height: 70%; border: 4px solid white; }
        .modal-btn { margin-top: 20px; background: #457b9d; }
    </style>
</head>
<body>

    <h2>Pro Web Camera</h2>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="snap">CAPTURE</button>
        <label>Light Adjust: <input type="range" id="brightness" min="50" max="150" value="100"></label>
    </div>

    <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

    <h3>Recent Shots</h3>
    <div id="gallery"></div>

    <div id="modal">
        <img id="modal-img" src="" alt="View">
        <button class="modal-btn" onclick="downloadImage()">Download Photo</button>
        <button class="modal-btn" style="background:#666" onclick="this.parentElement.style.display='none'">Close</button>
    </div>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap'), gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal'), modalImg = document.getElementById('modal-img');
        const brightness = document.getElementById('brightness');

        // Apply brightness filter
        brightness.oninput = () => video.style.filter = `brightness(${brightness.value}%)`;

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1920 }, height: { ideal: 1080 }, exposureMode: 'continuous' } 
            });
            video.srcObject = stream;
        }

        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            // Apply current filter to capture
            context.filter = video.style.filter;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.className = 'gallery-item';
            img.onclick = () => { modalImg.src = img.src; modal.style.display = 'flex'; };
            gallery.prepend(img); // Newest first
        });

        function downloadImage() {
    const link = document.createElement('a');
    
    // Create a temporary canvas to add the watermark
    const watermarkedCanvas = document.createElement('canvas');
    watermarkedCanvas.width = canvas.width;
    watermarkedCanvas.height = canvas.height;
    const ctx = watermarkedCanvas.getContext('2d');

    // Load the image into the new canvas
    const imgObj = new Image();
    imgObj.src = modalImg.src;
    imgObj.onload = () => {
        // Draw the photo
        ctx.drawImage(imgObj, 0, 0);
        
        // Style the watermark
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; // White, slightly transparent
        ctx.font = "40px Arial";
        ctx.textAlign = "right";
        
        // Draw the URL text
        ctx.fillText("https://waranthornay.github.io/OnlineCamera/", 
                     watermarkedCanvas.width - 20, 
                     watermarkedCanvas.height - 30);
        
        // Trigger the download
        link.download = 'my-photo.png';
        link.href = watermarkedCanvas.toDataURL('image/png');
        link.click();
    };
}

        initCamera();
    </script>
</body>
</html>
