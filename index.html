<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Camera (Privacy-First)</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        video { width: 100%; max-width: 800px; border: 4px solid #444; border-radius: 12px; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Live Camera</h1>
    <video id="video" autoplay playsinline></video>
    
    <div class="controls">
        <label>Brightness: <input type="range" id="brightness" min="50" max="150" value="100"></label>
    </div>

    <script>
        const video = document.getElementById('video');
        const brightness = document.getElementById('brightness');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera access denied:", err);
            }
        }

        brightness.oninput = () => video.style.filter = `brightness(${brightness.value}%)`;
        
        initCamera();
    </script>
</body>
</html>
